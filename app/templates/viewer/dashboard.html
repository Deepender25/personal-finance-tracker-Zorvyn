{% extends "base.html" %}
{% block title %} — Overview{% endblock %}

{% block content %}
<div class="page fade-in">
  <div class="page-header">
    <div>
      <h1 class="page-title">Financial Overview</h1>
      <p class="page-subtitle">Welcome back, {{ user.name }} 👋</p>
    </div>
    <div style="display:flex; gap:.75rem; align-items:center; flex-wrap:wrap;">
      <input type="date" id="dateFrom" class="form-control" style="width:150px;">
      <input type="date" id="dateTo" class="form-control" style="width:150px;">
      <button class="btn btn-secondary" onclick="loadViewerDashboard()">🔄 Refresh</button>
    </div>
  </div>

  <!-- Summary Cards -->
  <div class="stats-grid" id="summaryCards">
    <div class="stat-card income"><div class="skeleton" style="height:20px;width:80px;margin-bottom:.75rem;"></div><div class="skeleton" style="height:32px;width:120px;"></div></div>
    <div class="stat-card expense"><div class="skeleton" style="height:20px;width:80px;margin-bottom:.75rem;"></div><div class="skeleton" style="height:32px;width:120px;"></div></div>
    <div class="stat-card balance"><div class="skeleton" style="height:20px;width:80px;margin-bottom:.75rem;"></div><div class="skeleton" style="height:32px;width:120px;"></div></div>
  </div>

  <!-- Recent Transactions -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">📋 Recent Transactions</span>
      <span id="recentCount" style="font-size:.8rem; color:var(--text-muted);">Last 10 entries</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Category</th>
            <th>Notes</th>
            <th>Type</th>
            <th style="text-align:right;">Amount</th>
          </tr>
        </thead>
        <tbody id="recentTransactionsTable">
          <tr><td colspan="5" style="text-align:center; padding:3rem; color:var(--text-muted);">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>document.addEventListener('DOMContentLoaded', loadViewerDashboard);</script>
{% endblock %}
