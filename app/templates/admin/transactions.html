<div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden mb-8">
    <div class="px-6 py-4 border-b border-gray-200 bg-gray-50 flex flex-col sm:flex-row justify-between items-center gap-4">
        <h3 class="text-lg font-semibold leading-6 text-gray-900">Manage Transactions</h3>
        
        <div class="flex items-center gap-2 w-full sm:w-auto">
            <input type="text" id="searchTx" placeholder="Search notes..." class="text-sm border-gray-300 rounded shadow-sm focus:ring-indigo-500 focus:border-indigo-500 flex-grow" oninput="debounceTxSearch()">
            
            <select id="filterType" class="text-sm border-gray-300 rounded shadow-sm" onchange="loadAdminTransactionsTable()">
                <option value="">All Types</option>
                <option value="income">Income</option>
                <option value="expense">Expense</option>
            </select>
            
            <button class="bg-indigo-600 text-white px-3 py-2 rounded text-sm hover:bg-indigo-700 flex items-center gap-1 font-medium shadow-sm transition-colors" onclick="openAddTxModal()">
                + Record
            </button>
        </div>
    </div>
    
    <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-white">
                <tr>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Date</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Details</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Type</th>
                    <th scope="col" class="px-6 py-3 text-right text-xs font-semibold text-gray-600 uppercase tracking-wider">Amount</th>
                    <th scope="col" class="px-6 py-3 text-center text-xs font-semibold text-gray-600 uppercase tracking-wider">Actions</th>
                </tr>
            </thead>
            <tbody id="adminTransactionsTableBody" class="bg-white divide-y divide-gray-100">
                <tr><td colspan="5" class="py-10 text-center text-gray-500">Loading tracking data...</td></tr>
            </tbody>
        </table>
    </div>
    
    <div class="px-6 py-3 border-t border-gray-200 bg-gray-50 flex items-center justify-between">
        <span class="text-sm text-gray-700" id="adminTxMetaInfo">Showing 0 results</span>
        <div class="flex gap-2" id="adminTxPagination">
            <!-- Pagination buttons -->
        </div>
    </div>
</div>
