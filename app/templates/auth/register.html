{% extends "base.html" %}
{% block title %} — Register{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card fade-in">
    <div class="auth-logo">
      <div class="logo-icon">💰</div>
      <h1>Create account</h1>
      <p>Join Finance Dashboard today</p>
    </div>

    <form id="registerForm" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label class="form-label" for="name">Full Name</label>
        <input id="name" class="form-control" type="text" placeholder="John Doe" required>
        <span class="form-error" id="nameError"></span>
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input id="email" class="form-control" type="email" placeholder="you@example.com" required autocomplete="email">
        <span class="form-error" id="emailError"></span>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input id="password" class="form-control" type="password" placeholder="Min 8 chars, 1 uppercase, 1 number" required oninput="updateStrength(this.value)">
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <span style="font-size:.75rem; color:var(--text-muted); margin-top:.3rem; display:block;" id="strengthText">Enter a password</span>
        <span class="form-error" id="passwordError"></span>
      </div>
      <div class="form-group">
        <label class="form-label" for="confirmPassword">Confirm Password</label>
        <input id="confirmPassword" class="form-control" type="password" placeholder="Repeat your password" required>
        <span class="form-error" id="confirmError"></span>
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg" id="registerBtn">
        Create Account
      </button>
    </form>

    <div class="auth-divider">or</div>
    <p style="text-align:center; font-size:.875rem; color:var(--text-muted);">
      Already have an account? <a href="/login" style="color:var(--primary); font-weight:600;">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
