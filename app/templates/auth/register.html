{% extends "base.html" %}
{% block title %} — Register{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card fade-in">
        <div class="auth-logo">
            <h1 style="margin-bottom: 0.5rem;">Get Started</h1>
            <p>Join the next generation of finance dashboard</p>
        </div>

        <form id="registerForm" onsubmit="event.preventDefault(); handleRegister();">
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <div class="input-group">
                    <span class="input-icon-left">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </span>
                    <input type="text" id="regName" class="form-control" placeholder="John Doe" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Email Address</label>
                <div class="input-group">
                    <span class="input-icon-left">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    </span>
                    <input type="email" id="regEmail" class="form-control" placeholder="name@company.com" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-icon-left">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    </span>
                    <input type="password" id="regPassword" class="form-control" placeholder="••••••••" required oninput="checkPassStrength(this.value)">
                </div>
                <div class="strength-bar"><div id="strengthFill" class="strength-fill"></div></div>
                <p class="form-hint">At least 8 chars, 1 upper, 1 lower, 1 digit.</p>
            </div>

            <button type="submit" class="btn btn-primary btn-block btn-lg" id="regBtn" style="margin-top: 1rem;">
                Create Account
            </button>
        </form>

        <div class="auth-divider">OR</div>

        <div style="text-align: center; font-size: .875rem; color: var(--text-secondary);">
            Already have an account? 
            <a href="/login" style="color: var(--primary); text-decoration: none; font-weight: 600;">Sign in</a>
        </div>
    </div>
</div>
{% endblock %}
