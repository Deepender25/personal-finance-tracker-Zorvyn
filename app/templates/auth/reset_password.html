{% extends "base.html" %}
{% block title %} — Reset Password{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card fade-in">
        <div class="auth-logo">
            <h1 id="resetTitle" style="margin-bottom: 0.5rem;">Reset Password</h1>
            <p id="resetSub">We'll send you a recovery code</p>
        </div>

        <!-- Mode 1: Forgot Password (Email only) -->
        <form id="forgotForm" onsubmit="event.preventDefault(); handleForgot();">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <div class="input-group">
                    <span class="input-icon-left">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    </span>
                    <input type="email" id="forgotEmail" class="form-control" placeholder="name@company.com" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg" id="forgotBtn">Send Recovery Code</button>
        </form>

        <!-- Mode 2: Reset Password (OTP + New Pass) -->
        <form id="resetForm" style="display: none;" onsubmit="event.preventDefault(); handleReset();">
            <div class="form-group">
                <label class="form-label" id="recoveryInfo">Enter code sent to email</label>
                <div class="otp-group">
                    <input type="text" class="otp-input" maxlength="1" data-idx="0">
                    <input type="text" class="otp-input" maxlength="1" data-idx="1">
                    <input type="text" class="otp-input" maxlength="1" data-idx="2">
                    <input type="text" class="otp-input" maxlength="1" data-idx="3">
                    <input type="text" class="otp-input" maxlength="1" data-idx="4">
                    <input type="text" class="otp-input" maxlength="1" data-idx="5">
                </div>
            </div>
            <div class="form-group" style="margin-top: 1.5rem;">
                <label class="form-label">New Password</label>
                <div class="input-group">
                    <span class="input-icon-left">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    </span>
                    <input type="password" id="resetNewPass" class="form-control" placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg" id="resetBtn">Change Password</button>
        </form>

        <div style="text-align: center; margin-top: 2rem; font-size: .875rem;">
            <a href="/login" class="btn btn-ghost btn-sm">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                Back to sign in
            </a>
        </div>
    </div>
</div>
{% endblock %}
