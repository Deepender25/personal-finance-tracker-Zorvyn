{% extends "base.html" %}
{% block title %} — Reset Password{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card fade-in">
    <div class="auth-logo">
      <div class="logo-icon">🔒</div>
      <h1>Reset Password</h1>
      <p id="stepDesc">Enter your email to receive a reset code</p>
    </div>

    <!-- Step 1: Request OTP -->
    <form id="step1Form" onsubmit="handleForgotPassword(event)">
      <div class="form-group">
        <label class="form-label" for="resetEmail">Email address</label>
        <input id="resetEmail" class="form-control" type="email" placeholder="you@example.com" required>
        <span class="form-error" id="resetEmailError"></span>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="step1Btn">Send Reset Code</button>
    </form>

    <!-- Step 2: OTP + New Password -->
    <form id="step2Form" onsubmit="handleResetPassword(event)" style="display:none;">
      <div class="form-group">
        <label class="form-label" style="text-align:center; display:block; margin-bottom:.75rem;">Enter the 6-digit code</label>
        <div class="otp-group" id="resetOtpInputs">
          <input type="text" inputmode="numeric" maxlength="1" class="otp-input form-control" required>
          <input type="text" inputmode="numeric" maxlength="1" class="otp-input form-control" required>
          <input type="text" inputmode="numeric" maxlength="1" class="otp-input form-control" required>
          <input type="text" inputmode="numeric" maxlength="1" class="otp-input form-control" required>
          <input type="text" inputmode="numeric" maxlength="1" class="otp-input form-control" required>
          <input type="text" inputmode="numeric" maxlength="1" class="otp-input form-control" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="newPass">New Password</label>
        <input id="newPass" class="form-control" type="password" placeholder="New strong password" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="confirmNewPass">Confirm New Password</label>
        <input id="confirmNewPass" class="form-control" type="password" placeholder="Repeat new password" required>
        <span class="form-error" id="resetStep2Error"></span>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="step2Btn">Update Password</button>
    </form>

    <div style="text-align:center; margin-top:1.25rem;">
      <a href="/login" style="font-size:.875rem; color:var(--text-muted);">← Back to login</a>
    </div>
  </div>
</div>
{% endblock %}
