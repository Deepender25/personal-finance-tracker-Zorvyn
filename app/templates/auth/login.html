{% extends "base.html" %}
{% block title %} — Login{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card fade-in">
        <div class="auth-logo">
            <h1 style="margin-bottom: 0.5rem;">Welcome Back</h1>
            <p>Access your professional dashboard</p>
        </div>

        <form id="loginForm" onsubmit="event.preventDefault(); handleLogin();">
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <div class="input-group">
                    <span class="input-icon-left">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    </span>
                    <input type="email" id="email" class="form-control" placeholder="name@company.com" required>
                </div>
            </div>

            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: .4rem;">
                    <label class="form-label" style="margin-bottom: 0;" for="password">Password</label>
                    <a href="/forgot-password" style="font-size: .8rem; color: var(--primary); text-decoration: none; font-weight: 500;">Forgot password?</a>
                </div>
                <div class="input-group">
                    <span class="input-icon-left">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    </span>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn" style="margin-top: 1rem;">
                Sign In
            </button>
        </form>

        <div class="auth-divider">OR</div>

        <div style="text-align: center; font-size: .875rem; color: var(--text-secondary);">
            Don't have an account? 
            <a href="/register" style="color: var(--primary); text-decoration: none; font-weight: 600;">Create account</a>
        </div>
    </div>
</div>
{% endblock %}
