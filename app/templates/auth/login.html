{% extends "base.html" %}
{% block title %} — Login{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card fade-in">
    <div class="auth-logo">
      <div class="logo-icon">💰</div>
      <h1>Welcome back</h1>
      <p>Sign in to your Finance Dashboard</p>
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input id="email" class="form-control" type="email" placeholder="you@example.com" required autocomplete="email">
        <span class="form-error" id="emailError"></span>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input id="password" class="form-control" type="password" placeholder="Your password" required autocomplete="current-password">
        <span class="form-error" id="passwordError"></span>
      </div>

      <div style="display:flex; justify-content:flex-end; margin-bottom:1.25rem;">
        <a href="/forgot-password" style="font-size:.85rem; color:var(--primary); font-weight:500;">Forgot password?</a>
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn">
        Sign In
      </button>
    </form>

    <div class="auth-divider">or</div>
    <p style="text-align:center; font-size:.875rem; color:var(--text-muted);">
      Don't have an account? <a href="/register" style="color:var(--primary); font-weight:600;">Register</a>
    </p>
  </div>
</div>
{% endblock %}
