{% extends "base.html" %}
{% block title %} — Verify Email{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card fade-in">
        <div class="auth-logo">
            <h1 style="margin-bottom: 0.5rem;">Check your email</h1>
            <p>Verification code sent to <br><strong id="displayEmail">...</strong></p>
        </div>

        <form id="verifyForm" onsubmit="event.preventDefault(); handleVerify();">
            <div class="form-group">
                <div class="otp-group" id="otpGroup">
                    <input type="text" class="otp-input" maxlength="1" data-idx="0" required>
                    <input type="text" class="otp-input" maxlength="1" data-idx="1" required>
                    <input type="text" class="otp-input" maxlength="1" data-idx="2" required>
                    <input type="text" class="otp-input" maxlength="1" data-idx="3" required>
                    <input type="text" class="otp-input" maxlength="1" data-idx="4" required>
                    <input type="text" class="otp-input" maxlength="1" data-idx="5" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block btn-lg" id="verifyBtn" style="margin-top: 2rem;">
                Verify Email
            </button>
        </form>

        <div style="text-align: center; margin-top: 1.5rem; font-size: .875rem; color: var(--text-secondary);">
            Didn't receive the code? 
            <button class="btn btn-link" onclick="resendOtp()" style="padding: 0; font-weight: 600; color: var(--primary);">Resend code</button>
        </div>

        <div style="text-align: center; margin-top: 1rem;">
            <a href="/login" class="btn btn-ghost btn-sm">Sign in with another account</a>
        </div>
    </div>
</div>
{% endblock %}
